name: Multi-Platform Release

# Required GitHub Secrets:
#
# macOS bundles are built with cargo-bundle and ad-hoc signed (no Apple
# Developer certificate required). Users must right-click > Open on first
# launch, or run:
#   xattr -dr com.apple.quarantine Rustwave.app
#
# SOUNDCLOUD_CLIENT_ID: SoundCloud OAuth client ID
# SOUNDCLOUD_CLIENT_SECRET: SoundCloud OAuth client secret
# SOUNDCLOUD_REDIRECT_URL: SoundCloud OAuth redirect URL

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: ""

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
          - name: macos-intel
            os: macos-15-intel # Last available Intel runner image; retired ~Aug 2027
          - name: macos-arm
            os: macos-latest
          - name: linux-x64
            os: ubuntu-latest
          - name: linux-arm64
            os: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false # caching handled by rust-cache below

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config libssl-dev libdbus-1-dev

      - name: Install cargo-bundle (macOS)
        if: runner.os == 'macOS'
        run: cargo install cargo-bundle --locked

      - name: Create .env file
        shell: bash
        run: |
          cat > .env << EOF
          CLIENT_ID=${{ secrets.SOUNDCLOUD_CLIENT_ID }}
          CLIENT_SECRET=${{ secrets.SOUNDCLOUD_CLIENT_SECRET }}
          REDIRECT_URL=${{ secrets.SOUNDCLOUD_REDIRECT_URL }}
          EOF

      - name: Extract version from Cargo.toml
        shell: bash
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -n1 | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version: $VERSION"

      - name: Build release binary
        if: runner.os != 'macOS'
        run: cargo build --release

      - name: Build and sign app bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          cargo bundle --release --format osx

          APP=target/release/bundle/osx/Rustwave.app
          xattr -cr "$APP"
          codesign --force --deep --sign - "$APP"

          # Verify the signature
          codesign -v "$APP"
          codesign -dvv "$APP"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path rustwave-windows/assets
          Copy-Item target/release/rustwave.exe rustwave-windows/
          Copy-Item .env rustwave-windows/
          Copy-Item -Recurse -Force assets/* rustwave-windows/assets/
          $archiveName = "rustwave-windows-v${{ env.VERSION }}.zip"
          Compress-Archive -Path rustwave-windows -DestinationPath $archiveName
          echo "ARCHIVE_NAME=$archiveName" >> $env:GITHUB_ENV

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          ARCHIVE_NAME="rustwave-${{ matrix.name }}-v${VERSION}.tar.gz"
          tar -czf "$ARCHIVE_NAME" -C target/release/bundle/osx Rustwave.app
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p rustwave-${{ matrix.name }}/assets
          cp target/release/rustwave rustwave-${{ matrix.name }}/
          cp .env rustwave-${{ matrix.name }}/
          cp -r assets/* rustwave-${{ matrix.name }}/assets/
          chmod +x rustwave-${{ matrix.name }}/rustwave
          ARCHIVE_NAME="rustwave-${{ matrix.name }}-v${VERSION}.tar.gz"
          tar -czf "$ARCHIVE_NAME" rustwave-${{ matrix.name }}
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustwave-${{ matrix.name }}
          path: ${{ env.ARCHIVE_NAME }}
          retention-days: 30

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
